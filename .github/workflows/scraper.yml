name: Weekly TechDekho Scraper

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays at midnight UTC
  workflow_dispatch:
    inputs:
      url:
        description: 'Single Product URL to scrape manually'
        required: false
        type: string

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright google-genai
          playwright install chromium

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.url }}" != "" ]; then
            python build_pipeline.py --url "${{ github.event.inputs.url }}"
          elif [ -f urls.txt ]; then
            while IFS= read -r url || [ -n "$url" ]; do
              # Skip comments or empty lines
              [[ "$url" =~ ^[[:space:]]*# ]] && continue
              [[ -z "$url" ]] && continue
              echo "Processing: $url"
              python build_pipeline.py --url "$url"
            done < urls.txt
          else
            echo "Error: No URL provided via manual trigger and urls.txt not found."
            exit 1
          fi

      - name: Commit and Push Database Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          # Commit and push only if there are actual database modifications
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database via Gemini Scraper" && git push)
